<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your email</title>
</head>
<body style="margin: 0; padding: 0; background-color: #141815; font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color: #141815;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width: 520px; background-color: #181d19; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);">
          
          <!-- Header -->
          <tr>
            <td style="padding: 48px 40px 32px 40px; text-align: center;">
              <h1 style="margin: 0; font-family: 'Fraunces', Georgia, serif; font-size: 32px; font-weight: 400; color: #edf2ec; letter-spacing: -0.015em;">
                Verify your email
              </h1>
              <p style="margin: 16px 0 0 0; font-size: 16px; line-height: 1.6; color: #a6b1a8;">
                Welcome to LibreGuard
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding: 0 40px 32px 40px;">
              <p style="margin: 0 0 24px 0; font-size: 16px; line-height: 1.6; color: #a6b1a8;">
                Click the button below to verify your email address and activate your account.
              </p>
              
              <!-- CTA Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
                <tr>
                  <td align="center" style="border-radius: 12px; background-color: #9bd9b6;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; padding: 14px 32px; font-family: 'Hanken Grotesk', system-ui, sans-serif; font-size: 15px; font-weight: 500; color: #0d1712; text-decoration: none; border-radius: 12px;">
                      Verify email address
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Alternative link -->
              <p style="margin: 32px 0 0 0; font-size: 14px; line-height: 1.6; color: #6f7a72;">
                Or copy and paste this link into your browser:
              </p>
              <p style="margin: 8px 0 0 0; font-size: 13px; line-height: 1.5; color: #9bd9b6; word-break: break-all;">
                {{ .ConfirmationURL }}
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 32px 40px; border-top: 1px solid rgba(255, 255, 255, 0.08);">
              <p style="margin: 0; font-size: 13px; line-height: 1.5; color: #6f7a72; text-align: center;">
                If you didn't create this account, you can safely ignore this email.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
